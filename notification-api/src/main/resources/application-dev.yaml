spring:
  application:
    name: notification-api

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092,localhost:9094,localhost:9096
    consumer:
#      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
#      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      group-id: notification-product-created-group
#      auto-offset-reset: earliest
      properties:
        spring:
          deserializer:
            key:
              delegate:
                class: org.apache.kafka.common.serialization.StringDeserializer
            value:
              delegate:
                class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
          json:
            trusted:
              packages: com.grazielleanaia.notification_api.dto
            value:
              default:
                type: com.grazielleanaia.notification_api.dto.TaskEvent
  mail:
    host: smtp.gmail.com
    port: 587
    username: grazielle.anaia@gmail.com
    password: Auriflama*1981
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 0 #port 0 to start more instances of this service if needed