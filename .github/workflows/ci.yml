name: CI for Microservices

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-microservices:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [registration-api, scheduling-api, notification-api]

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Grant execute permission to gradlew
      - name: Grant execute permission to gradlew
        run: chmod +x ${{ matrix.service }}/gradlew

      # 4️⃣ Build the microservice
      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./gradlew build --no-daemon

      # 5️⃣ Optionally, run tests
      - name: Test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./gradlew build -x test --no-daemon