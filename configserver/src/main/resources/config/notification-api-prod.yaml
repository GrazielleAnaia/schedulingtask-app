spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
#  datasource:
#    url: jdbc:postgresql://localhost:5432/notification_db
#    username: postgres
#    password: secret
#  jpa:
#    hibernate:
#      ddl-auto: validate

  kafka:
    bootstrap-servers: host.docker.internal:9092,host.docker.internal:9094,host.docker.internal:9096
    consumer:
#      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
#      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      group-id: notification-product-created-group
#      auto-offset-reset: earliest
      properties:
        spring:
          deserializer:
            key:
              delegate:
                class: org.apache.kafka.common.serialization.StringDeserializer
            value:
              delegate:
                class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
          json:
            trusted:
              packages: com.grazielleanaia.notification_api.dto
            value:
              default:
                type: com.grazielleanaia.notification_api.dto.TaskEvent
  mail:
    host: smtp.gmail.com
    port: 587
    username: grazielle.anaia@gmail.com
    password:
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

management:
  endpoints:
    web:
      exposure:
        include: busrefresh,refresh,health,info,env
  endpoint:
    health:
      show-details: always

eureka:
  server:
    enable-self-preservation: true #keep instances temporarily
  instance:
    hostname: localhost
    ip-address: 127.0.0.1
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    healthcheck:
      enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

some:
  property: prod-value

server:
  port: 8088

