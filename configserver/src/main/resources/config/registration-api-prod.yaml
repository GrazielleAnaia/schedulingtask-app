management:
  endpoints:
    web:
      exposure:
        include: busrefresh,refresh,health,info,env
  endpoint:
    health:
      show-details: always

eureka:
  server:
    enable-self-preservation: true #keep instances temporarily
  instance:
    hostname: localhost
    ip-address: 127.0.0.1
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    healthcheck:
      enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

some:
  property: prod-value

server:
  port: 8082
