spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
some:
  property: dev-value

management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info,env

server:
  port: 8081